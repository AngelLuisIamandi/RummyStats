<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RummyStats - Estadísticas</title>
    <link rel="icon" href="/img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-main d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="bi bi-graph-up text-warning me-2"></i>Estadísticas</span>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
        </div>
    </nav>

    <div class="container mb-5">
        <div class="row g-4">
            <div class="col-12">
                <div class="card shadow border-0 p-4 rounded-4">
                    <h5 class="fw-bold mb-3">Evolución por Ronda</h5>
                    <div style="height: 350px;">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-12 col-md-6 offset-md-3">
                <div class="card shadow border-0 p-4 rounded-4">
                    <h5 class="fw-bold mb-3 text-center">Puntuación Actual</h5>
                    <div style="height: 250px;">
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/script.js"></script>
</body>
</html>
