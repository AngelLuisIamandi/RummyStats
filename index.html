<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RummyStats - Juego</title>
    <link rel="icon" href="/img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-main d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="bi bi-suit-spade-fill text-warning me-2"></i>RummyStats</span>
            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-list"></i>
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item active" href="index.html"><i
                                class="bi bi-controller me-2"></i>Partida</a></li>
                    <li><a class="dropdown-item" href="stats.html"><i class="bi bi-graph-up me-2"></i>Estadísticas</a>
                    </li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li>
                        <a class="dropdown-item" href="https://www.linkedin.com/in/%C3%A1ngel-luis-iamandi-02b558383/" target="_blank">
                            <i class="bi bi-linkedin me-2 text-primary"></i>Creado por Ángel
                        </a>
                    </li>
                    <li>
                        <hr class="dropdown-divider">
                    </li>
                    <li><a class="dropdown-item text-danger" href="#" data-bs-toggle="modal"
                            data-bs-target="#newGameModal">Reiniciar Partida</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5 mb-5">
        <div id="players" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
    </div>

    <div class="fixed-bottom bg-glass border-top p-3">
        <div class="container">
            <div class="input-group">
                <input id="playerName" type="text" class="form-control" placeholder="Nombre del jugador">
                <button onclick="addPlayer()" class="btn btn-primary px-4"><i class="bi bi-plus-lg"></i></button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white text-center">
                    <h5 class="modal-title w-100">Historial</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <ul id="historyList" class="list-group list-group-flush history-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="newGameModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body p-4 text-center">
                    <i class="bi bi-trash3 text-danger display-6"></i>
                    <h5 class="mt-3">¿Borrar todo?</h5>
                    <div class="d-flex gap-2 justify-content-center mt-3">
                        <button class="btn btn-light btn-sm" data-bs-dismiss="modal">No</button>
                        <button class="btn btn-danger btn-sm" id="confirmNewGame">Sí, reiniciar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/script.js"></script>
</body>

</html>
